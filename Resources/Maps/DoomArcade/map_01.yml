# DoomArcade Map Format
# width/height: размер карты в клетках
# tiles: двумерный массив (строки = Y, колонки = X)
#   0 = пусто (пол)
#   1 = серая стена (кирпич)
#   2 = тёмно-красная стена
#   3 = тёмно-зелёная стена (металл)
#   4 = тёмно-синяя стена (решётка)
# player_start: стартовая позиция игрока [x, y, angle_degrees]
# enemy_spawns: фиксированные точки спавна врагов (используются при нехватке случайных мест)

name: "UAC Research Facility"
width: 16
height: 16

